<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primrose & Magill — Comedy Night</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080808;
      color: #f0ebe0;
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(160deg, #130800 0%, #0a0500 50%, #080808 100%);
      border-bottom: 1px solid #1e1000;
      padding: 32px 20px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,130,0,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-eyebrow {
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 4px;
      color: #ff8c00;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .header-title {
      font-size: clamp(32px, 9vw, 56px);
      font-weight: normal;
      color: #fff;
      line-height: 1.0;
      letter-spacing: -0.5px;
    }
    .header-subtitle {
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 6px;
      color: #555;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .header-divider {
      width: 40px;
      height: 1px;
      background: #ff8c00;
      opacity: 0.6;
      margin: 14px auto;
    }
    .header-tagline {
      color: #666;
      font-size: 14px;
      font-style: italic;
    }
    .header-voter-count {
      margin-top: 10px;
      font-family: monospace;
      font-size: 12px;
      color: #ff8c00;
      min-height: 18px;
    }

    /* ── Layout ── */
    .container {
      max-width: 660px;
      margin: 0 auto;
      padding: 24px 14px 60px;
    }

    /* ── Name input ── */
    .field-label {
      display: block;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .name-input {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      border-radius: 7px;
      padding: 12px 14px;
      color: #f0ebe0;
      font-size: 16px;
      font-family: Georgia, serif;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 24px;
    }
    .name-input:focus { border-color: #ff8c00; }

    /* ── Section heading ── */
    .section-label {
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ── Show cards ── */
    .shows-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }
    .show-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 9px;
      padding: 12px 14px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .show-card:hover { border-color: #333; }
    .show-card.checked {
      background: #160d00;
      border-color: #ff8c00;
    }
    .show-card-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: rgba(255,255,255,0.025);
      transition: width 0.5s ease;
      pointer-events: none;
    }
    .show-card.checked .show-card-bar {
      background: rgba(255,140,0,0.09);
    }
    .show-card-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }
    .checkbox {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid #333;
      background: transparent;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .show-card.checked .checkbox {
      border-color: #ff8c00;
      background: #ff8c00;
    }
    .checkbox svg { display: none; }
    .show-card.checked .checkbox svg { display: block; }

    .show-info { flex: 1; min-width: 0; }
    .show-top {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .show-name {
      font-size: 15px;
      font-weight: bold;
      color: #ccc;
      transition: color 0.15s;
    }
    .show-card.checked .show-name { color: #fff; }

    .day-badge {
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      padding: 2px 7px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .day-badge.friday {
      background: rgba(120,180,255,0.12);
      color: #7ab4ff;
      border: 1px solid rgba(120,180,255,0.25);
    }
    .day-badge.saturday {
      background: rgba(255,180,80,0.12);
      color: #ffb450;
      border: 1px solid rgba(255,180,80,0.25);
    }
    .leading-badge {
      font-family: monospace;
      font-size: 10px;
      color: #ff8c00;
    }

    .show-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .show-date {
      font-size: 12px;
      color: #666;
    }
    .show-time {
      font-family: monospace;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
      background: #191919;
      border: 1px solid #282828;
      color: #555;
      transition: all 0.15s;
    }
    .show-card.checked .show-time {
      background: rgba(255,140,0,0.1);
      border-color: rgba(255,140,0,0.2);
      color: #ffaa44;
    }

    .show-vote-count {
      flex-shrink: 0;
      font-family: monospace;
      font-size: 13px;
      color: #ff8c00;
      min-width: 24px;
      text-align: right;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: bold;
      font-family: Georgia, serif;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }
    .btn-primary {
      background: #ff8c00;
      color: #000;
    }
    .btn-primary:disabled {
      background: #181818;
      color: #444;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #222;
      color: #555;
    }
    .btn-secondary:hover { border-color: #444; color: #999; }

    /* ── Error ── */
    .error-msg {
      color: #f55;
      font-size: 13px;
      text-align: center;
      margin-bottom: 12px;
    }

    /* ── Thanks screen ── */
    .thanks-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 36px 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .thanks-emoji { font-size: 40px; margin-bottom: 14px; }
    .thanks-title { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 6px; }
    .thanks-sub { color: #777; font-size: 14px; font-style: italic; margin-bottom: 16px; }
    .thanks-leading { font-family: monospace; font-size: 13px; color: #ff8c00; }

    /* ── Results screen ── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .results-title {
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: #ff8c00;
      text-transform: uppercase;
    }
    .results-sub {
      font-size: 13px;
      color: #666;
      font-style: italic;
      margin-top: 2px;
    }
    .refresh-btn {
      background: transparent;
      border: 1px solid #222;
      border-radius: 6px;
      color: #555;
      font-size: 12px;
      font-family: monospace;
      padding: 6px 12px;
      cursor: pointer;
    }
    .refresh-btn:hover { border-color: #444; color: #999; }

    .result-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 9px;
      padding: 12px 14px;
      position: relative;
      overflow: hidden;
      margin-bottom: 7px;
    }
    .result-card.top {
      background: #160d00;
      border-color: #ff8c00;
    }
    .result-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: rgba(255,255,255,0.025);
      transition: width 0.5s ease;
    }
    .result-card.top .result-bar { background: rgba(255,140,0,0.11); }
    .result-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }
    .result-info { flex: 1; min-width: 0; }
    .result-top-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 3px;
    }
    .result-star { color: #ff8c00; font-size: 12px; }
    .result-name { font-weight: bold; font-size: 14px; color: #bbb; }
    .result-card.top .result-name { color: #fff; }
    .result-date { font-size: 12px; color: #555; }
    .result-voters { font-size: 11px; color: #555; margin-top: 2px; }
    .result-count {
      flex-shrink: 0;
      font-family: monospace;
      font-size: 15px;
      font-weight: bold;
      color: #2a2a2a;
    }
    .result-card.top .result-count,
    .result-card.has-votes .result-count { color: #ff8c00; }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 60px 0;
      color: #555;
      font-style: italic;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 32px;
      font-family: monospace;
      font-size: 10px;
      color: #252525;
      letter-spacing: 2px;
    }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-eyebrow">★ Side Splitters Comedy Club · Tampa ★</div>
    <div class="header-title">Primrose</div>
    <div class="header-subtitle">&amp; Magill</div>
    <div class="header-divider"></div>
    <div class="header-tagline">Who's free? Pick your nights and let's lock it in. 🎤</div>
    <div class="header-voter-count" id="voterCount"></div>
  </div>

  <div class="container">

    <!-- Loading -->
    <div class="screen active" id="screenLoading">
      <div class="loading">Loading votes…</div>
    </div>

    <!-- Vote screen -->
    <div class="screen" id="screenVote">
      <label class="field-label" for="nameInput">Your Name</label>
      <input class="name-input" id="nameInput" type="text" placeholder="Enter your name..." autocomplete="off">

      <div class="section-label">Select All Dates You Can Make It</div>
      <div class="shows-list" id="showsList"></div>

      <div class="error-msg" id="voteError" style="display:none"></div>
      <button class="btn btn-primary" id="submitBtn" disabled>Select at least one night</button>
      <button class="btn btn-secondary" id="viewResultsBtn">View Results →</button>
    </div>

    <!-- Thanks screen -->
    <div class="screen" id="screenThanks">
      <div class="thanks-card">
        <div class="thanks-emoji">🎤</div>
        <div class="thanks-title" id="thanksTitle">You're in!</div>
        <div class="thanks-sub" id="thanksSub"></div>
        <div class="thanks-leading" id="thanksLeading"></div>
      </div>
      <button class="btn btn-primary" id="seeResultsBtn">See Full Results</button>
      <button class="btn btn-secondary" id="voteAgainBtn">Vote for someone else</button>
    </div>

    <!-- Results screen -->
    <div class="screen" id="screenResults">
      <div class="results-header">
        <div>
          <div class="results-title">Live Results</div>
          <div class="results-sub" id="resultsSub">0 voters so far</div>
        </div>
        <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
      </div>
      <div id="resultsList"></div>
      <button class="btn btn-primary" id="castVoteBtn" style="margin-top:8px">Cast My Vote</button>
    </div>

    <div class="footer">SIDE SPLITTERS · 12938 N. DALE MABRY HWY · TAMPA, FL</div>
  </div>

<script>

  const SHOWS = [

    { id:"s21", comedian:"Dedrick Flynn",    date:"Sat, Aug 1",  day:"Saturday", times:["6:00 PM","8:00 PM"] },
    { id:"s22", comedian:"Kurt Metzger",     date:"Fri, Aug 7",  day:"Friday",   times:["7:00 PM","9:30 PM"] },
    { id:"s23", comedian:"Kurt Metzger",     date:"Sat, Aug 8",  day:"Saturday", times:["6:00 PM","8:00 PM"] },
    { id:"s24", comedian:"Sam Tallent",      date:"Fri, Aug 14", day:"Friday",   times:["7:00 PM","9:30 PM"] },

    { id:"s26", comedian:"Ian Bagg",         date:"Fri, Aug 21", day:"Friday",   times:["7:00 PM","9:30 PM"] },
    { id:"s27", comedian:"Ian Bagg",         date:"Sat, Aug 22", day:"Saturday", times:["6:00 PM","8:00 PM"] },

    { id:"s29", comedian:"April Macie",      date:"Sat, Sep 6",  day:"Saturday", times:["6:00 PM","8:00 PM"] },

    { id:"s39", comedian:"Ryan Sickler",     date:"Sat, Oct 10", day:"Saturday", times:["6:00 PM","8:00 PM"] },

    { id:"s47", comedian:"Ben Bankas",       date:"Sat, Nov 22", day:"Saturday", times:["6:00 PM","8:00 PM"] },

    { id:"s49", comedian:"Jason Cheny",      date:"Sat, Nov 28", day:"Saturday", times:["6:00 PM","8:00 PM"] },
    { id:"s50", comedian:"Andrew Dice Clay", date:"Fri, Dec 4",  day:"Friday",   times:["7:30 PM"] },
    { id:"s51", comedian:"Andrew Dice Clay", date:"Sat, Dec 5",  day:"Saturday", times:["8:00 PM"] },
    { id:"s52", comedian:"Luis J. Gomez",    date:"Fri, Jan 1",  day:"Friday",   times:["7:00 PM","9:30 PM"] },
    { id:"s53", comedian:"Luis J. Gomez",    date:"Sat, Jan 2",  day:"Saturday", times:["6:00 PM","8:00 PM"] },
    { id:"s54", comedian:"Rocky Dale Davis", date:"Fri, Jan 8",  day:"Friday",   times:["7:00 PM","9:30 PM"] },
    { id:"s55", comedian:"Rocky Dale Davis", date:"Sat, Jan 9",  day:"Saturday", times:["8:00 PM","10:30 PM"] },
  ];

  // ── State ──
  let voteData = { voters: {}, totals: {} };
  let selected = new Set();
  let currentScreen = "loading";

  // ── Gist API ──
  async function readStore() {
    const res = await fetch(WORKER_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("read failed");
    const data = await res.json();
    return (data && data.voters) ? data : freshData();
  }

  async function writeStore(data) {
    const res = await fetch(WORKER_URL, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error("write failed");
  }

  function freshData() {
    const d = { voters: {}, totals: {} };
    SHOWS.forEach(s => d.totals[s.id] = 0);
    return d;
  }

  // ── Screen management ──
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen' + name[0].toUpperCase() + name.slice(1)).classList.add('active');
    currentScreen = name;
  }

  // ── Render ──
  function maxVotes() {
    return Math.max(...SHOWS.map(s => voteData.totals[s.id] || 0), 1);
  }

  function topShowIds() {
    const max = Math.max(...SHOWS.map(s => voteData.totals[s.id] || 0));
    if (max === 0) return [];
    return SHOWS.filter(s => (voteData.totals[s.id] || 0) === max).map(s => s.id);
  }

  function updateVoterCount() {
    const n = Object.keys(voteData.voters).length;
    document.getElementById('voterCount').textContent =
      n > 0 ? n + (n === 1 ? ' person has' : ' people have') + ' voted' : '';
  }

  function renderShows() {
    const list = document.getElementById('showsList');
    const max = maxVotes();
    const tops = topShowIds();
    list.innerHTML = '';
    SHOWS.forEach(s => {
      const votes = voteData.totals[s.id] || 0;
      const pct = max > 0 ? (votes / max) * 100 : 0;
      const isChecked = selected.has(s.id);
      const isTop = tops.includes(s.id) && votes > 0;
      const card = document.createElement('div');
      card.className = 'show-card' + (isChecked ? ' checked' : '');
      card.dataset.id = s.id;
      card.innerHTML = `
        <div class="show-card-bar" style="width:${pct}%"></div>
        <div class="show-card-inner">
          <div class="checkbox">
            <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
              <polyline points="2,6 5,9 10,3" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="show-info">
            <div class="show-top">
              <span class="show-name">${s.comedian}</span>
              <span class="day-badge ${s.day.toLowerCase()}">${s.day}</span>
              ${isTop ? '<span class="leading-badge">★ LEADING</span>' : ''}
            </div>
            <div class="show-bottom">
              <span class="show-date">${s.date}</span>
              ${s.times.map(t => `<span class="show-time">${t}</span>`).join('')}
            </div>
          </div>
          ${votes > 0 ? `<div class="show-vote-count">${votes}</div>` : ''}
        </div>`;
      card.addEventListener('click', () => toggleShow(s.id));
      list.appendChild(card);
    });
  }

  function renderResults() {
    const sorted = [...SHOWS].sort((a,b) =>
      (voteData.totals[b.id]||0) - (voteData.totals[a.id]||0)
    );
    const max = maxVotes();
    const tops = topShowIds();
    const n = Object.keys(voteData.voters).length;
    document.getElementById('resultsSub').textContent =
      n + (n === 1 ? ' voter' : ' voters') + ' so far';

    const list = document.getElementById('resultsList');
    list.innerHTML = '';
    sorted.forEach(s => {
      const votes = voteData.totals[s.id] || 0;
      const pct = max > 0 ? (votes / max) * 100 : 0;
      const isTop = tops.includes(s.id) && votes > 0;
      const whoVoted = Object.entries(voteData.voters)
        .filter(([,ids]) => ids.includes(s.id))
        .map(([n]) => n);
      const card = document.createElement('div');
      card.className = 'result-card' + (isTop ? ' top' : '') + (votes > 0 ? ' has-votes' : '');
      card.innerHTML = `
        <div class="result-bar" style="width:${pct}%"></div>
        <div class="result-inner">
          <div class="result-info">
            <div class="result-top-row">
              ${isTop ? '<span class="result-star">★</span>' : ''}
              <span class="result-name">${s.comedian}</span>
              <span class="day-badge ${s.day.toLowerCase()}">${s.day}</span>
              <span class="result-date">${s.date}</span>
            </div>
            ${whoVoted.length > 0 ? `<div class="result-voters">${whoVoted.join(', ')}</div>` : ''}
          </div>
          <div class="result-count">${votes}</div>
        </div>`;
      list.appendChild(card);
    });
  }

  // ── Actions ──
  function toggleShow(id) {
    if (selected.has(id)) selected.delete(id);
    else selected.add(id);
    updateSubmitBtn();
    renderShows();
  }

  function updateSubmitBtn() {
    const btn = document.getElementById('submitBtn');
    const name = document.getElementById('nameInput').value.trim();
    const ok = name.length > 0 && selected.size > 0;
    btn.disabled = !ok;
    btn.textContent = selected.size === 0
      ? 'Select at least one night'
      : `Submit My Vote (${selected.size} night${selected.size > 1 ? 's' : ''})`;
  }

  async function submitVote() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name || selected.size === 0) return;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    document.getElementById('voteError').style.display = 'none';
    try {
      const current = await readStore();
      if (current.voters[name]) {
        current.voters[name].forEach(id => {
          current.totals[id] = Math.max(0, (current.totals[id] || 0) - 1);
        });
      }
      const ids = Array.from(selected);
      current.voters[name] = ids;
      ids.forEach(id => { current.totals[id] = (current.totals[id] || 0) + 1; });
      await writeStore(current);
      voteData = current;
      updateVoterCount();

      const tops = topShowIds();
      const topShow = tops.length > 0 ? SHOWS.find(s => s.id === tops[0]) : null;
      const maxV = Math.max(...SHOWS.map(s => voteData.totals[s.id] || 0));
      document.getElementById('thanksTitle').textContent = `You're in, ${name}!`;
      document.getElementById('thanksSub').textContent =
        `Voted for ${ids.length} night${ids.length > 1 ? 's' : ''}. Share the link with the group so everyone can vote.`;
      document.getElementById('thanksLeading').textContent = topShow && maxV > 0
        ? `★ ${topShow.comedian} (${topShow.date}) is leading with ${maxV} vote${maxV > 1 ? 's' : ''}`
        : '';
      showScreen('thanks');
    } catch(e) {
      const err = document.getElementById('voteError');
      err.textContent = 'Couldn\'t save your vote — please try again.';
      err.style.display = 'block';
      btn.disabled = false;
      updateSubmitBtn();
    }
  }

  async function loadAndShowResults() {
    try {
      voteData = await readStore();
      updateVoterCount();
      renderResults();
    } catch {}
    showScreen('results');
  }

  function resetToVote() {
    selected.clear();
    document.getElementById('nameInput').value = '';
    updateSubmitBtn();
    renderShows();
    showScreen('vote');
  }

  // ── Init ──
  async function init() {
    try {
      voteData = await readStore();
    } catch {}
    updateVoterCount();
    renderShows();
    showScreen('vote');
  }

  // ── Event listeners ──
  document.getElementById('nameInput').addEventListener('input', updateSubmitBtn);
  document.getElementById('submitBtn').addEventListener('click', submitVote);
  document.getElementById('viewResultsBtn').addEventListener('click', loadAndShowResults);
  document.getElementById('seeResultsBtn').addEventListener('click', loadAndShowResults);
  document.getElementById('voteAgainBtn').addEventListener('click', resetToVote);
  document.getElementById('castVoteBtn').addEventListener('click', resetToVote);
  document.getElementById('refreshBtn').addEventListener('click', async () => {
    try {
      voteData = await readStore();
      updateVoterCount();
      renderResults();
    } catch {}
  });

  init();
</script>
</body>
</html>
